<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  body{width:260px;margin:0;font-family:'Inter',system-ui,Arial,sans-serif;background:#0c1322;color:#fff;padding:16px}
  h1{font-size:15px;font-weight:900;margin:0 0 3px}
  p{font-size:11.5px;color:#9fb3d6;margin:0 0 14px;line-height:1.5}
  label{font-size:11px;font-weight:700;color:#9fb3d6;display:block;margin-bottom:6px}
  select{width:100%;padding:9px 10px;border-radius:9px;border:1px solid #2a3852;background:#16223a;color:#fff;
    font-family:inherit;font-size:13px;font-weight:700;outline:none;margin-bottom:14px}
  button{width:100%;border:none;border-radius:10px;padding:12px;font-family:inherit;font-size:14px;font-weight:800;
    cursor:pointer;color:#fff;transition:.15s}
  .start{background:#16a34a}.start:hover{background:#15903f}
  .stop{background:#dc2626}.stop:hover{background:#c01d1d}
  .status{margin-top:12px;font-size:11.5px;font-weight:700;text-align:center;color:#7ee0a6;min-height:16px}
  .hint{margin-top:12px;font-size:10.5px;color:#5b6b8c;line-height:1.5}
</style>
</head>
<body>
  <h1>🎧 Live Translate</h1>
  <p>Dịch trực tiếp âm thanh cuộc họp (Meet / Zoom / Teams) trong tab hiện tại.</p>

  <label>Dịch sang / Translate to</label>
  <select id="lang">
    <option value="ko">🇰🇷 한국어</option>
    <option value="vi">🇻🇳 Tiếng Việt</option>
    <option value="en">🇺🇸 English</option>
    <option value="ja">🇯🇵 日本語</option>
    <option value="zh">🇨🇳 中文</option>
    <option value="th">🇹🇭 ไทย</option>
    <option value="es">🇪🇸 Español</option>
    <option value="fr">🇫🇷 Français</option>
  </select>

  <button id="toggle" class="start">▶ Bắt đầu</button>
  <div class="status" id="status"></div>
  <div class="hint">Mở trang họp trước, rồi bấm Bắt đầu. Phụ đề hiện ngay trên trang (kéo thả được).</div>

  <script src="popup.js"></script>
</body>
</html>
