<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<style>
  body{width:270px;margin:0;font-family:'Inter',system-ui,Arial,sans-serif;background:#0c1322;color:#fff;padding:16px}
  h1{font-size:15px;font-weight:900;margin:0 0 12px}
  .auth{margin-bottom:14px}
  .gbtn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;border:1px solid #2a3852;
    background:#16223a;color:#fff;font-family:inherit;font-size:13px;font-weight:700;padding:10px;border-radius:9px;cursor:pointer}
  .gbtn:hover{background:#1c2c49}
  .anote{font-size:10.5px;color:#7e8da8;margin-top:7px;line-height:1.45}
  .prof{display:flex;align-items:center;gap:8px;background:#16223a;border:1px solid #243352;border-radius:9px;padding:8px 10px}
  .prof .em{font-size:11.5px;font-weight:600;color:#cdd9f2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .prof .plan{font-size:9.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:20px;background:#1f6bff;color:#fff}
  .prof .plan.free{background:#33415c}
  .prof .lo{font-size:10px;color:#9fb3d6;cursor:pointer;background:none;border:none;font-weight:700;text-decoration:underline}
  label{font-size:11px;font-weight:700;color:#9fb3d6;display:block;margin-bottom:6px}
  select{width:100%;padding:9px 10px;border-radius:9px;border:1px solid #2a3852;background:#16223a;color:#fff;
    font-family:inherit;font-size:13px;font-weight:700;outline:none}
  .modeseg{display:flex;gap:4px;background:#101a2e;border:1px solid #2a3852;border-radius:9px;padding:3px;margin-bottom:12px}
  .modeseg button{flex:1;border:none;background:none;color:#9fb3d6;font-family:inherit;font-size:12px;font-weight:800;
    padding:7px;border-radius:7px;cursor:pointer}
  .modeseg button.on{background:#1f6bff;color:#fff}
  .srcseg{display:flex;gap:4px;background:#101a2e;border:1px solid #2a3852;border-radius:9px;padding:3px;margin-bottom:7px}
  .srcseg button{flex:1;border:none;background:none;color:#9fb3d6;font-family:inherit;font-size:11px;font-weight:800;
    padding:7px 4px;border-radius:7px;cursor:pointer;white-space:nowrap}
  .srcseg button.on{background:#1f6bff;color:#fff}
  .srchint{font-size:10px;color:#7e8da8;margin-bottom:14px;line-height:1.45}
  .langrow{display:flex;align-items:center;gap:7px;margin-bottom:14px}
  .swapic{color:#9fb3d6;font-weight:800;font-size:15px}
  button.act{width:100%;border:none;border-radius:10px;padding:12px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;color:#fff;transition:.15s}
  .start{background:#16a34a}.start:hover{background:#15903f}
  .stop{background:#dc2626}.stop:hover{background:#c01d1d}
  .status{margin-top:12px;font-size:11.5px;font-weight:700;text-align:center;color:#7ee0a6;min-height:16px}
  .microw{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:#cdd9f2;cursor:pointer;margin-bottom:14px}
  .microw input{width:15px;height:15px;cursor:pointer}
  .microw .mhint{font-size:9.5px;color:#7e8da8;font-weight:500}
  .hint{margin-top:12px;font-size:10.5px;color:#5b6b8c;line-height:1.5}
  #runbar{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35);border-radius:10px;
    padding:10px 12px;margin-bottom:13px;font-size:12px;font-weight:800;color:#7ee0a6}
  #runbar span{display:block;margin-top:4px;font-size:10.5px;font-weight:600;color:#9fb3d6;line-height:1.45}
  #cfg{transition:.15s}
  details{margin-top:12px;font-size:10px;color:#5b6b8c}
  details code{display:block;margin-top:6px;background:#16223a;border:1px solid #243352;border-radius:7px;padding:6px;
    word-break:break-all;color:#9fb3d6;font-size:9.5px}
  .ver{font-size:10px;color:#6b7a99;font-weight:500}
</style>
</head>
<body>
  <h1>🎧 Live Translate <span id="ver" class="ver"></span></h1>

  <div class="auth" id="auth"></div>

  <div id="runbar" style="display:none"></div>

  <div id="cfg">
  <label>Chế độ dịch</label>
  <div class="modeseg" id="modeseg">
    <button type="button" data-w="one" class="on">→ 1 chiều</button>
    <button type="button" data-w="two">⇄ Song ngữ</button>
  </div>

  <label id="langLbl">Dịch sang / Translate to</label>
  <div class="langrow">
    <select id="lang">
      <option value="ko">🇰🇷 한국어</option>
      <option value="vi">🇻🇳 Tiếng Việt</option>
      <option value="en">🇺🇸 English</option>
      <option value="ja">🇯🇵 日本語</option>
      <option value="zh">🇨🇳 中文</option>
      <option value="th">🇹🇭 ไทย</option>
      <option value="es">🇪🇸 Español</option>
      <option value="fr">🇫🇷 Français</option>
    </select>
    <span id="swapIc" class="swapic" style="display:none">⇄</span>
    <select id="langB" style="display:none">
      <option value="vi">🇻🇳 Tiếng Việt</option>
      <option value="ko">🇰🇷 한국어</option>
      <option value="en">🇺🇸 English</option>
      <option value="ja">🇯🇵 日本語</option>
      <option value="zh">🇨🇳 中文</option>
      <option value="th">🇹🇭 ไทย</option>
      <option value="es">🇪🇸 Español</option>
      <option value="fr">🇫🇷 Français</option>
    </select>
  </div>

  <label>Nguồn âm thanh</label>
  <div class="srcseg" id="srcseg">
    <button type="button" data-s="tab" class="on">🔊 Tab</button>
    <button type="button" data-s="tabmic">🔊+🎤 Tab + mic</button>
    <button type="button" data-s="mic">🎤 Mic</button>
  </div>
  <div class="srchint" id="srchint">Dịch âm thanh của tab đang mở (Meet, Zoom, YouTube…).</div>
  </div>

  <button id="toggle" class="act start">▶ Bắt đầu</button>
  <div class="status" id="status"></div>
  <div class="hint">Mở trang họp/YouTube, rồi bấm Bắt đầu. Điều khiển (Dừng/Tóm tắt) hiện ngay trên trang.</div>

  <details>
    <summary>Cấu hình đăng nhập</summary>
    <span style="display:block;margin-top:6px">Thêm URL này vào Supabase → Redirect URLs:</span>
    <code id="redir"></code>
  </details>

  <script src="popup.js"></script>
</body>
</html>
