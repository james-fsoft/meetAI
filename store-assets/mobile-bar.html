<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
:root{--paper:#fff;--hair:#e7ebf3;--ink:#0a1124;--grey:#5b6b8c;--acc:#1f6bff;--faint:#9aa6bd}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI','Malgun Gothic',Inter,sans-serif;background:#f8fafc;padding:12px;width:390px}
.cap-top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:8px 12px;background:#fff;border:1px solid var(--hair);border-radius:14px;box-shadow:0 10px 24px -20px rgba(15,23,42,.4)}
.cap-meta{display:flex;flex-direction:row;align-items:center;gap:10px}
.timer{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--faint)}
.lvtog{display:flex;align-items:center;gap:7px}
.dot{width:9px;height:9px;border-radius:50%;background:#e5484d}
.txt{font-size:11px;font-weight:800;color:#e5484d}
.sw{width:38px;height:22px;background:var(--acc);border-radius:20px;position:relative}.sw::after{content:"";position:absolute;top:2.5px;right:2.5px;width:17px;height:17px;background:#fff;border-radius:50%}
.dual{display:flex;flex-direction:row;gap:8px}
.btn{padding:9px 18px;font-size:13.5px;font-weight:800;border-radius:10px;border:2px solid var(--acc)}
.btn.out{background:#fff;color:var(--ink)}.btn.full{background:var(--acc);color:#fff}
.chat{margin-top:10px;background:#f7f9fc;border:1px solid var(--hair);border-radius:16px;padding:14px;min-height:200px;color:#94a3b8;font-size:13px}
</style></head><body>
<div class="cap-top">
  <div class="cap-meta"><span class="timer">00:47</span><span class="lvtog"><span class="dot"></span><span class="txt">LIVE</span><span class="sw"></span></span></div>
  <div class="dual"><span class="btn out">Pause</span><span class="btn full">Stop</span></div>
</div>
<div class="chat">↑ Thanh controls slim — chat có nhiều chỗ hơn…</div>
</body></html>
