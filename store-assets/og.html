<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;font-family:'Segoe UI','Malgun Gothic',system-ui,sans-serif;overflow:hidden}
.stage{width:1200px;height:630px;background:linear-gradient(135deg,#2563eb 0%,#1e3aef 55%,#4f46e5 100%);
  display:flex;flex-direction:column;justify-content:center;padding:0 84px;color:#fff;position:relative}
.brand{display:flex;align-items:center;gap:16px;margin-bottom:30px}
.logo{width:64px;height:64px}
.bname{font-size:34px;font-weight:800;letter-spacing:-.02em}
h1{font-size:62px;font-weight:900;letter-spacing:-.03em;line-height:1.08;max-width:900px}
.sub{font-size:26px;font-weight:500;color:#dce8ff;margin-top:22px;line-height:1.45;max-width:880px}
.gift{position:absolute;top:54px;right:84px;display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.16);
  border:1px solid rgba(255,255,255,.3);border-radius:40px;padding:14px 26px;font-size:25px;font-weight:800}
.feet{display:flex;gap:14px;margin-top:40px}
.chip{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:30px;padding:11px 22px;font-size:21px;font-weight:700}
.url{position:absolute;bottom:46px;right:84px;font-size:23px;font-weight:700;color:#cfe0ff}
</style></head><body>
<div class="stage">
  <div class="gift">🎁 2 giờ miễn phí</div>
  <div class="brand">
    <svg class="logo" viewBox="0 0 100 100"><path d="M22 8 H78 a16 16 0 0 1 16 16 V60 a16 16 0 0 1 -16 16 H50 l-20 18 v-18 H22 a16 16 0 0 1 -16 -16 V24 A16 16 0 0 1 22 8 Z" fill="#fff"/><g fill="#2563eb"><rect x="26" y="38" width="7.5" height="12" rx="3.75"/><rect x="39" y="29" width="7.5" height="30" rx="3.75"/><rect x="52" y="22" width="7.5" height="44" rx="3.75"/><rect x="65" y="32" width="7.5" height="24" rx="3.75"/></g></svg>
    <span class="bname">Flash Meet</span>
  </div>
  <h1>Dịch họp trực tiếp, tóm tắt bằng AI</h1>
  <div class="sub">Phụ đề song ngữ real-time cho Google Meet, Zoom, YouTube — tách giọng từng người, tự tạo biên bản.</div>
  <div class="feet"><span class="chip">⚡ Real-time</span><span class="chip">👥 Tách giọng</span><span class="chip">📝 Tóm tắt AI</span></div>
  <div class="url">meet.transflash.app</div>
</div>
</body></html>
