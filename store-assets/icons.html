<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0}html,body{width:880px;height:320px;background:#fff;font-family:'Segoe UI',sans-serif}
.row{display:flex;gap:0;align-items:center;justify-content:space-around;height:260px}
.cell{text-align:center}
.cell svg{width:130px;height:130px;display:block;margin:0 auto 10px}
.cell span{font-size:15px;font-weight:700;color:#0a1124}
.lbl{height:60px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#0a1124}
</style></head><body>
<div class="lbl">Icon options — A · B · C</div>
<div class="row">
  <!-- A: gradient tile + symmetric wave -->
  <div class="cell">
    <svg viewBox="0 0 100 100">
      <defs><linearGradient id="ga" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5b8cff"/><stop offset="1" stop-color="#3b5bf5"/></linearGradient></defs>
      <rect x="6" y="6" width="88" height="88" rx="27" fill="url(#ga)"/>
      <g fill="#fff">
        <rect x="21.5" y="42" width="7" height="16" rx="3.5"/>
        <rect x="34" y="35" width="7" height="30" rx="3.5"/>
        <rect x="46.5" y="28" width="7" height="44" rx="3.5"/>
        <rect x="59" y="35" width="7" height="30" rx="3.5"/>
        <rect x="71.5" y="42" width="7" height="16" rx="3.5"/>
      </g>
    </svg>
    <span>A — Tile + sóng</span>
  </div>

  <!-- B: refined chat bubble + ascending wave, gradient -->
  <div class="cell">
    <svg viewBox="0 0 100 100">
      <defs><linearGradient id="gb" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5b8cff"/><stop offset="1" stop-color="#4f46e5"/></linearGradient></defs>
      <path d="M24 10 H76 a18 18 0 0 1 18 18 V58 a18 18 0 0 1 -18 18 H44 L26 92 V76 a18 18 0 0 1 -2 -0.4 A18 18 0 0 1 6 58 V28 A18 18 0 0 1 24 10 Z" fill="url(#gb)"/>
      <g fill="#fff">
        <rect x="29" y="40" width="7" height="14" rx="3.5"/>
        <rect x="41" y="33" width="7" height="28" rx="3.5"/>
        <rect x="53" y="27" width="7" height="40" rx="3.5"/>
        <rect x="65" y="36" width="7" height="22" rx="3.5"/>
      </g>
    </svg>
    <span>B — Bong bóng chat</span>
  </div>

  <!-- C: minimal gradient waveform, no tile -->
  <div class="cell">
    <svg viewBox="0 0 100 100">
      <defs><linearGradient id="gc" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5b8cff"/><stop offset="1" stop-color="#3b5bf5"/></linearGradient></defs>
      <g fill="url(#gc)">
        <rect x="14" y="44" width="11" height="12" rx="5.5"/>
        <rect x="31" y="34" width="11" height="32" rx="5.5"/>
        <rect x="48" y="20" width="11" height="60" rx="5.5"/>
        <rect x="65" y="34" width="11" height="32" rx="5.5"/>
        <rect x="82" y="44" width="11" height="12" rx="5.5"/>
      </g>
    </svg>
    <span>C — Sóng tối giản</span>
  </div>
</div>
</body></html>
